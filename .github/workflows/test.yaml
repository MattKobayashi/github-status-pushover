---
env:
  REPO_NAME: mattkobayashi
  IMAGE_NAME: github-status-pushover
jobs:
  python:
    name: Python
    runs-on: ubuntu-24.04
    steps:
      # Set up Python
      # https://github.com/actions/setup-python
      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.14.6"
      # Checkout repository
      # https://github.com/actions/checkout
      - name: Checkout repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # Install test dependencies
      - name: Install test dependencies
        run: |
          pipx install uv
      - env:
          PUSHOVER_TOKEN: "test_token"
          PUSHOVER_USER: "test_user"
        name: Execute tests
        run: |
          uv run --group test pytest tests/ -v
  image:
    name: Image
    runs-on: ubuntu-24.04
    steps:
      # Checkout the repository
      # https://github.com/actions/checkout
      - name: Checkout the repository
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      # Add support for more platforms with QEMU (optional)
      # https://github.com/docker/setup-qemu-action
      - name: Set up QEMU
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
      # Set up buildx
      # https://github.com/docker/setup-buildx-action
      - name: Set up buildx
        uses: docker/setup-buildx-action@d7f5e7f509e45cec5c76c4d5afdd7de93d0b3df5 # v4.1.0
      # Build and load container image
      # https://github.com/docker/build-push-action
      - name: Build container image
        id: build
        uses: docker/build-push-action@f9f3042f7e2789586610d6e8b85c8f03e5195baf # v7.2.0
        with:
          context: .
          load: true
          tags: "${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:test"
      # Test container image
      - name: Test container image
        run: |
          set -eux
          CONTAINER_ID="$(uuidgen)"
          docker container run \
          --attach=stdout \
          --attach=stderr \
          --env PUSHOVER_TOKEN=${{ secrets.PUSHOVER_TOKEN }} \
          --env PUSHOVER_USER=${{ secrets.PUSHOVER_USER }} \
          --name=$CONTAINER_ID \
          --rm ${{ env.REPO_NAME }}/${{ env.IMAGE_NAME }}:test &
          sleep 30
          docker container stop $CONTAINER_ID
      # Remove the test container image
      - name: Remove container image
        if: ${{ !cancelled() }}
        run: |
          set -eux
          docker image rm --force ${{ steps.build.outputs.imageid }}
name: Test
on:
  pull_request:
    branches:
      - main
  workflow_dispatch:
permissions:
  contents: read
